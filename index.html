<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Word Quest">
  <meta name="theme-color" content="#f9c95b">
  <meta name="description" content="A gentle daily reading game for early readers.">
  <title>The Great Word Quest</title>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Game controls">
      <button id="parentToggle" class="icon-button" type="button" aria-label="Open grown-up settings">Settings</button>
      <div class="progress-strip" aria-live="polite">
        <span id="progressLabel">Week 1, Day 1</span>
        <span id="tierLabel">The Valley of Sounds</span>
      </div>
      <button id="soundToggle" class="icon-button icon-round" type="button" aria-label="Turn sound on or off">Audio</button>
    </header>

    <main class="game-layout">
      <section class="scene-stage" aria-label="Adventure scene">
        <div id="sceneFrame" class="scene-frame"></div>
      </section>

      <section class="play-panel" aria-label="Reading challenge">
        <div class="realm-row">
          <span id="realmBadge" class="realm-badge">Daily Quest</span>
          <span id="roundBadge" class="round-badge">1 of 5</span>
        </div>
        <h1 id="questTitle">Welcome, word explorer</h1>
        <p id="companionLine" class="companion-line">Lumi is lighting the first path.</p>
        <div id="targetWord" class="target-word" aria-live="polite"></div>
        <div id="challengeArea" class="challenge-area"></div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
        <div class="action-row">
          <button id="hearButton" class="voice-action" type="button" aria-label="Hear Lumi speak again"><span class="play-icon" aria-hidden="true"></span><span class="button-label">Listen</span></button>
          <button id="nextButton" class="primary-action hidden-action" type="button" hidden>Next</button>
        </div>
      </section>
    </main>

    <aside id="parentPanel" class="parent-panel" aria-label="Grown-up settings" hidden>
      <div class="panel-head">
        <h2>Grown-up settings</h2>
        <button id="closePanel" class="icon-button icon-round" type="button" aria-label="Close settings">Close</button>
      </div>
      <div class="settings-grid">
        <label for="weekSelect">Week</label>
        <select id="weekSelect"></select>
        <label for="daySelect">Day</label>
        <select id="daySelect"></select>
        <button id="goToDay" class="secondary-action" type="button">Go to quest</button>
        <button id="resetGame" class="secondary-action danger-action" type="button">Reset progress</button>
      </div>
      <div id="parentStats" class="parent-stats"></div>
    </aside>
  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
